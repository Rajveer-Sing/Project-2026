# Deploy infrastructure on azure cloud

name: "Deployment of infra on azure cloud"
on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main


jobs:
  job1:
    name: "1. Terraform CI (Vslidateion & Scan)"
    runs-on: ubuntu-latest

    steps:
      # step 1: clone repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
