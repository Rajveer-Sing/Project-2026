# Deploy infrastructure on azure cloud

name: "Deployment of infra on azure cloud"
on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read


jobs:
  terraform_ci:
    name: "1. Terraform CI (Vslidateion & Scan)"
    runs-on: ubuntu-latest

    steps:
      # step 1: clone repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Formet check
        run: terraform fmt

      - name: Terraform init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Run checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: false

  terraform_cd:
    name: "2. Terraform CD (Deploy on Azure)"
    needs: terraform_ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Azure login via OIDC
        uses: azure/Login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
